<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自助報到圖片編輯工具</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>自助報到圖片編輯工具</h1>
        </header>

        <div class="toolbar">
            <!-- 圖片上傳 -->
            <div class="tool-group">
                <label for="uploadImage" class="btn btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    上傳圖片
                </label>
                <input type="file" id="uploadImage" accept="image/*" style="display: none;">
            </div>

            <!-- 文字工具 -->
            <div class="tool-group text-tools">
                <input type="text" id="textInput" placeholder="輸入文字內容">
                <select id="fontFamily">
                    <option value="Arial">Arial</option>
                    <option value="微軟正黑體">微軟正黑體</option>
                    <option value="新細明體">新細明體</option>
                    <option value="標楷體">標楷體</option>
                    <option value="Times New Roman">Times New Roman</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Verdana">Verdana</option>
                </select>
                <input type="color" id="textColor" value="#000000" title="文字顏色">
                <input type="number" id="fontSize" value="60" min="10" max="200" placeholder="字體大小">
                <button id="addText" class="btn btn-primary">新增文字</button>
            </div>

            <!-- 物件操作按鈕 -->
            <div class="tool-group">
                <button id="deleteBtn" class="btn btn-danger" title="刪除">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                    刪除
                </button>
                <button id="lockBtn" class="btn" title="鎖定">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    鎖定
                </button>
                <button id="unlockBtn" class="btn" title="解鎖">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
                    </svg>
                    解鎖
                </button>
            </div>

            <!-- 圖層控制 -->
            <div class="tool-group">
                <button id="bringToFront" class="btn" title="置最上層">
                    <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                        <path d="M342.6 105.4C330.1 92.9 309.8 92.9 297.3 105.4L137.3 265.4C124.8 277.9 124.8 298.2 137.3 310.7C149.8 323.2 170.1 323.2 182.6 310.7L320 173.3L457.4 310.6C469.9 323.1 490.2 323.1 502.7 310.6C515.2 298.1 515.2 277.8 502.7 265.3L342.7 105.3zM502.6 457.4L342.6 297.4C330.1 284.9 309.8 284.9 297.3 297.4L137.3 457.4C124.8 469.9 124.8 490.2 137.3 502.7C149.8 515.2 170.1 515.2 182.6 502.7L320 365.3L457.4 502.6C469.9 515.1 490.2 515.1 502.7 502.6C515.2 490.1 515.2 469.8 502.7 457.3z"/>
                    </svg>
                    最上層
                </button>
                <button id="bringForward" class="btn" title="置上一層">
                    <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                        <path d="M297.4 201.4C309.9 188.9 330.2 188.9 342.7 201.4L502.7 361.4C515.2 373.9 515.2 394.2 502.7 406.7C490.2 419.2 469.9 419.2 457.4 406.7L320 269.3L182.6 406.6C170.1 419.1 149.8 419.1 137.3 406.6C124.8 394.1 124.8 373.8 137.3 361.3L297.3 201.3z"/>
                    </svg>
                    上一層
                </button>
                <button id="sendBackward" class="btn" title="置下一層">
                   <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"> 
                    <path d="M297.4 438.6C309.9 451.1 330.2 451.1 342.7 438.6L502.7 278.6C515.2 266.1 515.2 245.8 502.7 233.3C490.2 220.8 469.9 220.8 457.4 233.3L320 370.7L182.6 233.4C170.1 220.9 149.8 220.9 137.3 233.4C124.8 245.9 124.8 266.2 137.3 278.7L297.3 438.7z"/></svg>
                    下一層
                </button>
                <button id="sendToBack" class="btn" title="置最下層">
                    <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                        <path d="M342.6 534.6C330.1 547.1 309.8 547.1 297.3 534.6L137.3 374.6C124.8 362.1 124.8 341.8 137.3 329.3C149.8 316.8 170.1 316.8 182.6 329.3L320 466.7L457.4 329.4C469.9 316.9 490.2 316.9 502.7 329.4C515.2 341.9 515.2 362.2 502.7 374.7L342.7 534.7zM502.6 182.6L342.6 342.6C330.1 355.1 309.8 355.1 297.3 342.6L137.3 182.6C124.8 170.1 124.8 149.8 137.3 137.3C149.8 124.8 170.1 124.8 182.6 137.3L320 274.7L457.4 137.4C469.9 124.9 490.2 124.9 502.7 137.4C515.2 149.9 515.2 170.2 502.7 182.7z"/>
                    </svg>
                    最下層
                </button>
            </div>

            <!-- 文字編輯 -->
            <div class="tool-group">
                <button id="editTextBtn" class="btn btn-secondary" title="編輯文字">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                    編輯文字
                </button>
            </div>

            <!-- 下載按鈕 -->
            <div class="tool-group download-group">
                <button id="downloadBtn" class="btn btn-success">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    下載 JPG
                </button>
            </div>
        </div>

        <!-- 圖片庫 -->
        <div class="image-library">
            <h3>圖片素材庫</h3>
            <div class="image-gallery" id="imageGallery">
                <!-- 圖片將由 JavaScript 動態載入 -->
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>

        <div class="info">
            <p>預覽尺寸: 1200 x 625 px | 匯出尺寸: 1920 x 1000 px</p>
        </div>
    </div>

    <!-- 文字編輯對話框 -->
    <div id="textEditModal" class="modal">
        <div class="modal-content">
            <h3>編輯文字</h3>
            <textarea id="editTextArea" rows="5"></textarea>
            <div class="modal-buttons">
                <button id="saveTextEdit" class="btn btn-primary">儲存</button>
                <button id="cancelTextEdit" class="btn">取消</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
